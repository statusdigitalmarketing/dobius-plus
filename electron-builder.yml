appId: com.statusdigital.dobius-plus
productName: "Dobius+"
afterPack: build/after-pack.cjs
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  darkModeSupport: true
  identity: "Status Consulting Firm LLC (Z349CC556Z)"
  hardenedRuntime: true
  # gatekeeperAssess defaults to true. Enable so the local `spctl --assess`
  # check verifies the signed app is Gatekeeper-acceptable at BUILD time,
  # not when users download. Codex Apple-grade audit P3.
  gatekeeperAssess: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  artifactName: ${name}-${version}-${arch}-mac.${ext}
dmg:
  title: "Dobius+"
  artifactName: ${name}-${version}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
directories:
  output: dist-electron
  buildResources: build
files:
  - dist/**/*
  - dist-mobile/**/*
  - electron/**/*
  - node_modules/node-pty/**/*
  - package.json
publish:
  provider: github
  owner: statusdigitalmarketing
  repo: dobius-plus
  releaseType: release
